<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Mafia</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
}

.container{
width:100%;
max-width:380px;
background:#141414;
border:1px solid #8b5cf6;
border-radius:20px;
padding:25px;
text-align:center;
box-shadow:0 0 30px rgba(139,92,246,.35);
}

.logo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
border:3px solid #8b5cf6;
margin-bottom:15px;
}

h1{
font-size:28px;
color:#c084fc;
margin-bottom:10px;
}

.tagline{
font-size:14px;
color:#d1d5db;
line-height:1.6;
margin-bottom:20px;
}

.members{
display:inline-block;
background:#1f1f1f;
padding:10px 18px;
border-radius:10px;
margin-bottom:20px;
color:#22c55e;
font-weight:bold;
}

.join-btn{
display:block;
background:linear-gradient(90deg,#8b5cf6,#a855f7);
color:white;
text-decoration:none;
padding:15px;
border-radius:12px;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.join-btn:hover{
opacity:.9;
}

.footer{
margin-top:15px;
font-size:12px;
color:#8a8a8a;
}

.footer a{
color:#8a8a8a;
text-decoration:none;
margin:0 8px;
}
</style>

</head>

<body>

<div class="container">

<img src="logo.jpeg" class="logo">

<h1>PREDICTION MAFIA</h1>

<div class="members">30K+ Members</div>

<p class="tagline">
Join our cricket community for match analysis,
team insights, fantasy cricket discussions and daily updates.
</p>

<a href="https://telegram.me/+qprvDFpBY442ZjZl" class="join-btn">
JOIN TELEGRAM
</a>

<div class="footer">
<a href="#">Privacy Policy</a> |
<a href="#">Contact</a>
</div>

</div>

</body>
</html>
